services:
  nginx:
    image: nginx:1.27-alpine
    container_name: rinha-nginx
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - sockets:/sockets
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "20MB"

  api1:
    image: murilodacio/rinha-de-backend-2026:latest
    container_name: rinha-api1
    environment:
      PORT: "8080"
      UNIX_SOCKET_PATH: "/sockets/api1.sock"
      LISTEN_UNIX_SOCKET: "/sockets/api1.sock"
      GENERATED_PATH: "/app/generated"
      DATASETS_PATH: "/app/datasets"
      IVF_NPROBE: "6"
      IVF_BBOX_REPAIR_LIMIT: "4"
      DEBUG_RESPONSE: "false"
      GOMAXPROCS: "1"
      GOMEMLIMIT: "120MiB"
      MMAP_WARMUP: "index"
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "165MB"

  api2:
    image: murilodacio/rinha-de-backend-2026:latest
    container_name: rinha-api2
    environment:
      PORT: "8080"
      UNIX_SOCKET_PATH: "/sockets/api2.sock"
      LISTEN_UNIX_SOCKET: "/sockets/api2.sock"
      GENERATED_PATH: "/app/generated"
      DATASETS_PATH: "/app/datasets"
      IVF_NPROBE: "6"
      IVF_BBOX_REPAIR_LIMIT: "4"
      DEBUG_RESPONSE: "false"
      GOMAXPROCS: "1"
      GOMEMLIMIT: "120MiB"
      MMAP_WARMUP: "index"
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "165MB"

volumes:
  sockets:
