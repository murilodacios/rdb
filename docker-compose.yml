version: "2.4"

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: rinha-nginx
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - sockets:/sockets
    depends_on:
      - api1
      - api2
    cpu_period: 10000
    cpu_quota: 2000
    mem_limit: 40m

  api1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rinha-api1
    environment:
      PORT: "8080"
      UNIX_SOCKET_PATH: "/sockets/api1.sock"
      GENERATED_PATH: "/app/generated"
      DATASETS_PATH: "/app/datasets"
      IVF_NPROBE: "${IVF_NPROBE:-4}"
      IVF_BBOX_REPAIR_LIMIT: "${IVF_BBOX_REPAIR_LIMIT:-2}"
      DEBUG_RESPONSE: "${DEBUG_RESPONSE:-false}"
      GOMAXPROCS: "1"
      GOMEMLIMIT: "120MiB"
      MMAP_WARMUP: "${MMAP_WARMUP:-index}"
    volumes:
      - sockets:/sockets
    cpu_period: 10000
    cpu_quota: 4500
    mem_limit: 165m

  api2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rinha-api2
    environment:
      PORT: "8080"
      UNIX_SOCKET_PATH: "/sockets/api2.sock"
      GENERATED_PATH: "/app/generated"
      DATASETS_PATH: "/app/datasets"
      IVF_NPROBE: "${IVF_NPROBE:-4}"
      IVF_BBOX_REPAIR_LIMIT: "${IVF_BBOX_REPAIR_LIMIT:-2}"
      DEBUG_RESPONSE: "${DEBUG_RESPONSE:-false}"
      GOMAXPROCS: "1"
      GOMEMLIMIT: "120MiB"
      MMAP_WARMUP: "${MMAP_WARMUP:-index}"
    volumes:
      - sockets:/sockets
    cpu_period: 10000
    cpu_quota: 4500
    mem_limit: 165m

volumes:
  sockets:
