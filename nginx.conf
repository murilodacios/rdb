events {}

http {
  upstream api_backend {
    server unix:/sockets/api1.sock;
    server unix:/sockets/api2.sock;
  }

  server {
    listen 9999;

    location / {
      proxy_pass http://api_backend;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header Connection "";

      proxy_buffering off;
    }
  }
}
